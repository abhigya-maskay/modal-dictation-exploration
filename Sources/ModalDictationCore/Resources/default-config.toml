# Modal Dictation — Default Configuration
# Location: ~/.modal-dictation/config.toml

# ------------------------------------------------------------------------------
# Hotkeys
# ------------------------------------------------------------------------------
# Each hotkey can be a keyboard key string (e.g., "f18") or an HID device table
# with vendor_id, product_id, and button (for foot pedals or similar devices).
#
# Keyboard example:   dictation_hold = "f18"
# HID device example:
#   [hotkeys.dictation_hold_device]
#   vendor_id = 0x1234
#   product_id = 0x5678
#   button = 1

[hotkeys]
dictation_hold = "fn"
sleep_toggle = "f15"

# ------------------------------------------------------------------------------
# Microphone
# ------------------------------------------------------------------------------
# device_id: Audio input device identifier. Omit or leave empty for system default.

[mic]
# device_id = ""

# ------------------------------------------------------------------------------
# Speech Recognition
# ------------------------------------------------------------------------------

[speech]
# Seconds of silence before speech is processed
timeout = 0.3

# Minutes of inactivity before entering sleep mode (comment out to disable)
auto_sleep_minutes = 3.0

# ------------------------------------------------------------------------------
# Commands — Actions
# ------------------------------------------------------------------------------
# Phrase → app action. These trigger application behavior, not keystrokes.

[commands.actions]
"dictation mode" = "mode:dictation"
"command mode" = "mode:command"
"go to sleep" = "app:sleep"
"wake up" = "app:wake"

# ------------------------------------------------------------------------------
# Commands — Modifiers
# ------------------------------------------------------------------------------
# Spoken form → modifier key. These compose with keys (e.g., "command adam" → cmd+a).

[commands.modifiers]
"command" = "cmd"
"super" = "cmd"
"control" = "ctrl"
"shift" = "shift"
"option" = "alt"
"alt" = "alt"
"function" = "fn"
"globe" = "fn"

# ------------------------------------------------------------------------------
